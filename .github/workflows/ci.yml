name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Package requires Swift tools 6.3+ (swift-tools-version: 6.3).
env:
  DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer

jobs:
  api-stability:
    name: API stability vs v1.0.0
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Reject SemVer-breaking changes
        run: swift package diagnose-api-breaking-changes v1.0.0

  test:
    name: swift test
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          set -euo pipefail
          echo "DEVELOPER_DIR=$DEVELOPER_DIR"
          test -d "$DEVELOPER_DIR" || {
            echo "::error::Missing $DEVELOPER_DIR — list of Xcodes:"
            ls /Applications | grep -i Xcode || true
            exit 1
          }
          xcodebuild -version
          swift --version
          swift package dump-package >/dev/null

      - name: Run tests and enforce portable-core coverage
        run: ./Scripts/check-coverage.sh 70

      - name: Line count guard
        run: ./Scripts/check-line-count.sh

  thread-sanitizer:
    name: thread sanitizer
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Run tests under Thread Sanitizer
        run: swift test --sanitize=thread

  documentation:
    name: validate DocC
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Build documentation
        run: ./Scripts/generate-docc.sh "$RUNNER_TEMP/PulsePlayerDocs"

  build-demo:
    name: build iOS demo
    runs-on: macos-26
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          set -euo pipefail
          test -d "$DEVELOPER_DIR"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate & build iOS demo
        working-directory: Examples/PulsePlayerDemo
        run: |
          set -euo pipefail
          xcodegen generate
          xcodebuild \
            -project PulsePlayerDemo.xcodeproj \
            -scheme PulsePlayerDemo \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath ./DerivedData \
            build \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=YES

  build-tv-demo:
    name: build tvOS demo
    runs-on: macos-26
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          set -euo pipefail
          test -d "$DEVELOPER_DIR"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate & build tvOS demo
        working-directory: Examples/PulsePlayerTVDemo
        run: |
          set -euo pipefail
          xcodegen generate
          xcodebuild \
            -project PulsePlayerTVDemo.xcodeproj \
            -scheme PulsePlayerTVDemo \
            -destination 'generic/platform=tvOS Simulator' \
            -derivedDataPath ./DerivedData \
            build \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=YES
