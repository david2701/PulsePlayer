name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Package requires Swift tools 6.3+ (swift-tools-version: 6.3).
env:
  DEVELOPER_DIR: /Applications/Xcode_26.6.app/Contents/Developer

jobs:
  test:
    name: swift test
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          set -euo pipefail
          echo "DEVELOPER_DIR=$DEVELOPER_DIR"
          test -d "$DEVELOPER_DIR" || {
            echo "::error::Missing $DEVELOPER_DIR — list of Xcodes:"
            ls /Applications | grep -i Xcode || true
            exit 1
          }
          xcodebuild -version
          swift --version
          if ! swift --version 2>&1 | grep -qE 'Swift version 6\.(3|4|5|6|7|8|9)'; then
            echo "::error::Need Swift 6.3+ (package tools-version 6.3)."
            exit 1
          fi

      - name: Run tests
        run: swift test

      - name: Line count guard
        run: ./Scripts/check-line-count.sh

  build-demo:
    name: build iOS demo
    runs-on: macos-26
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          set -euo pipefail
          test -d "$DEVELOPER_DIR"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate & build iOS demo
        working-directory: Examples/PulsePlayerDemo
        run: |
          set -euo pipefail
          xcodegen generate
          DEST='platform=iOS Simulator,name=iPhone 17'
          if ! xcrun simctl list devices available | grep -q 'iPhone 17'; then
            DEST='platform=iOS Simulator,name=iPhone 16'
          fi
          echo "Building with -destination $DEST"
          xcodebuild \
            -project PulsePlayerDemo.xcodeproj \
            -scheme PulsePlayerDemo \
            -destination "$DEST" \
            -derivedDataPath ./DerivedData \
            build CODE_SIGNING_ALLOWED=NO

  build-tv-demo:
    name: build tvOS demo
    runs-on: macos-26
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          set -euo pipefail
          test -d "$DEVELOPER_DIR"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate & build tvOS demo
        working-directory: Examples/PulsePlayerTVDemo
        run: |
          set -euo pipefail
          xcodegen generate
          DEST='platform=tvOS Simulator,name=Apple TV'
          echo "Building with -destination $DEST"
          xcodebuild \
            -project PulsePlayerTVDemo.xcodeproj \
            -scheme PulsePlayerTVDemo \
            -destination "$DEST" \
            -derivedDataPath ./DerivedData \
            build CODE_SIGNING_ALLOWED=NO
