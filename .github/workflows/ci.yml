name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: swift test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app
      - name: Swift version
        run: swift --version
      - name: Run tests
        run: swift test
      - name: Line count guard
        run: ./Scripts/check-line-count.sh

  build-demo:
    name: build iOS demo
    runs-on: macos-15
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate & build demo
        working-directory: Examples/PulsePlayerDemo
        run: |
          xcodegen generate
          xcodebuild \
            -project PulsePlayerDemo.xcodeproj \
            -scheme PulsePlayerDemo \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -derivedDataPath ./DerivedData \
            build CODE_SIGNING_ALLOWED=NO
