name: Network integration

on:
  workflow_dispatch:
  schedule:
    - cron: "23 5 * * 0"

permissions:
  contents: read

concurrency:
  group: network-integration-${{ github.ref }}
  cancel-in-progress: true

env:
  DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
  PULSEPLAYER_RUN_NETWORK_TESTS: "1"

jobs:
  apple-hls:
    name: Apple HLS integration
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version
      - name: Run real AVPlayer tests
        run: swift test --filter AVIntegrationTests
